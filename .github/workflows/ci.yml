name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-js:
    name: Frontend inline-JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check inline scripts in index.html
        run: node scripts/check-html-js.mjs

  edge-functions:
    name: Edge function type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: deno check all edge functions
        run: |
          set -e
          for f in supabase/functions/*/index.ts; do
            echo "::group::deno check $f"
            deno check "$f"
            echo "::endgroup::"
          done
